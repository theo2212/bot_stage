name: "🔴 BOT - VERSION FINALE - CLIQUE ICI"

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Debug - Check Files
        run: |
          ls -R
          cat requirements.txt

      - name: Install & Run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
          SEARCH_LOCATIONS: ${{ secrets.SEARCH_LOCATIONS }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-jobspy requests PyMuPDF python-docx pyyaml openai watchdog beautifulsoup4 pandas openpyxl selenium webdriver-manager rich psycopg2-binary sqlalchemy groq streamlit plotly
          python -c "import jobspy; print('✅ JobSpy Version:', jobspy.__version__ if hasattr(jobspy, '__version__') else 'Installed')"
          python main.py search
