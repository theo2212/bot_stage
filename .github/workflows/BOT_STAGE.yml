name: "BOT_STAGE"

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🏁 1. RÉCUPÉRATION DU CODE
        uses: actions/checkout@v4

      - name: 🐍 2. CONFIGURATION PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 3. INSTALLATION DES BIBLIOTHÈQUES
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: 🚀 5. LANCEMENT DU SCAN
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
          SEARCH_LOCATIONS: ${{ secrets.SEARCH_LOCATIONS }}
          MASTER_CV_TEXT: ${{ secrets.MASTER_CV_TEXT }}
        run: |
          echo "Démarrage du script principal..."
          python -u main.py search
